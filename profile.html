<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card UI Design</title>
    
    <link rel="stylesheet" href="profile.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body >
    <div class="profile-card">
    <div class="image">
        <img src="c:\Users\Ramyasri\Pictures\mee.jpg" alt="profile" class="profile-img">
    </div>
    <div class="text-data">
        <span class="name">Ramyasri</span>
        <span class="work"> Student & Web developer</span>
    </div>
    <div class="media-buttons">
        <a href="#" style="background-color:#4267b2 ;" class="link">
            <i class='bx bxl-facebook'></i> </a>
            <a href="#" style="background-color: #e1306c;" class="link">
                <i class='bx bxl-instagram' ></i></a>
            <a href="#"  style="background-color: #0088cc;" class="link">
                <i class='bx bxl-telegram' ></i></a>
                <a href="#" style="background-color: #1da1f2;" class="link">
                    <i class='bx bxl-twitter' ></i></a>
                <a href="#" style="background-color:red ;" class="link">
                    <i class='bx bxl-youtube' ></i></a>
       
    </div>
    <div class="buttons">
        <button class="button">Subscribe</button>
         <button class="button">Message</button>
    </div>
    <div class="analystic">
        <div class="data">
        <i class='bx bx-heart' ></i>
        <span class="number">60k&nbsp;&nbsp;</span>
        </div>
        
        <div class="data">
        <i class='bx bx-message-rounded' ></i>
        <span class="number">600 &nbsp;&nbsp;</span>
        </div>
        <div class="data">
        <i class='bx bx-share' ></i>
        <span class="number">40k</span>
        </div>
    </div>
</div>
</body>
</html>
