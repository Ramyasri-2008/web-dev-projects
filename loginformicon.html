<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="loginformicon.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"

</head>
<body>
    <div class="main_div">
        <div class="title">Login Form</div>
        <div class="social_icons">
            <a href="#"><i class='bx bxl-facebook'></i><span>Facebook</span></a>
        
                
            <a href="#"><i class='bx bxl-twitter'></i><span>Twitter</span></a>
        </div>
        <form action="#">
            <div class="input-box">
                <input type="text" placeholder="enter Email or Phone" required>
                <div class="icon"><i class="fas fa-user"></i></div>
            </div>
            <div class="input-box">
                <input type="password" placeholder="enter password" required>
                <div class="icon"><i class="fas fa-lock"></i></div>
            </div>
            
                <div class="option_div">
                    <div class="check_box">
                        <input type="checkbox">
                        <span>Remember me</span>

                    
                </div>
                    <div class="forget_div">
                        <a href="#">Forget password</a>
                    </div>
                </div>
                <div class="input-box button">
                <input type="submit" value="Login">
            </div>
            <div class="sign-up">
                Not a member?<a href="#">Sign-up here</a>
            </div>
        </form>
    </div>
</body>
</html>
